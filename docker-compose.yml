services:
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile   # ← Usa el Dockerfile que ya tienes
    ports:
      - "3000:3000"
    volumes:
      - .:/app                 # ← Bind mount para código en vivo
      - /app/node_modules      # ← Protege node_modules
      - /app/.next             # ← Protege .next (build cache)
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      - CHOKIDAR_USEPOLLING=true   # ← Hot-reload en Docker
      - WATCHPACK_POLLING=true     # ← Hot-reload para Next.js
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres-data:
